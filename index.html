<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASA Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!--  AUTH SCREEN -->
<section id="auth-section" class="auth-container">
  <div class="auth-card">
    <h2>Login</h2>

    <form>

      <label for="email">Email</label>    
      <input id="email" type="email" placeholder="Email" required>

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Password" minlength="8" required>

      <button type="submit">Sign In</button>

    </form>

    <p>Don't have an account?</p>
    <button onclick="signUp()" class="secondary">Sign Up</button>
  </div>
</section>

<!--  MAIN APP (HIDDEN INITIALLY) -->
<section id="app-section" style="display:none;">

  <h1> NASA Explorer</h1>

  <button onclick="logout()">Logout</button>

  <div>
    <button onclick="loadAPOD()"> APOD</button>
    <button onclick="loadMars()"> Mars</button>
    <button onclick="loadFavorites()"> Favorites</button>
  </div>

  <main id="root"></main>

</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
  const supabase = window.supabase.createClient(
    "YOUR_SUPABASE_URL",
    "YOUR_SUPABASE_KEY"
  );
</script>

<script src="script.js"></script>

</body>
</html>
