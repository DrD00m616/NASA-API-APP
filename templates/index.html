<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASA Explorer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!--  AUTH SCREEN -->
<section id="auth-section" class="auth-container">
  <div class="auth-card">
    <h2>Login</h2>

    <form>

      <label for="email">Email</label>    
      <input id="email" type="email" placeholder="Email" required>

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Password" minlength="8" required>

      <button type="button" onclick="login()">Sign In</button>

    </form>

    <p>Don't have an account?</p>
    <button onclick="signUp()" class="secondary">Sign Up</button>
  </div>
</section>

<!--  MAIN APP (HIDDEN INITIALLY) -->
<section id="app-section" style="display:none;">

  <h1> NASA Explorer</h1>

  <button onclick="logout()">Logout</button>

  <div>
    <button onclick="loadAPOD()"> APOD</button>
    <button onclick="loadImages()"> NASA Images</button>
    <button onclick="loadEvents()">  Events</button>
    <button onclick="loadFavorites()"> Favorites</button>
  </div>

  <main id="root"></main>

</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
  const supabaseClient = supabase.createClient(
    "{{ supabase_url }}",
    "{{ supabase_key }}"
  );

  // expose globally
  window.supabase = supabaseClient;
</script>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
